name: CI/CD

# Intégration continue sur toutes les branches et sur les pull requests ;
# le déploiement n'est déclenché que sur `main`, et uniquement si le job
# de qualité a réussi (dépendance explicite via `needs`).
on:
  push:
  pull_request:

jobs:
  quality:
    name: Qualité (lint, types, tests, build)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Installation reproductible des dépendances
        run: npm ci

      - name: Génération du client Prisma
        run: npx prisma generate

      - name: Analyse statique (ESLint)
        run: npm run lint

      - name: Vérification des types (TypeScript)
        run: npm run typecheck

      - name: Tests unitaires et couverture
        run: npx vitest run --coverage

      - name: Publication du rapport de couverture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build de production
        run: npx next build

  deploy:
    name: Déploiement sur le VPS
    runs-on: ubuntu-latest
    # Le déploiement dépend du succès du job `quality` : si un test, le lint,
    # la vérification de types ou le build échoue, ce job n'est pas exécuté.
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Déploiement par SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: bash ~/apps/planify/deploy.sh
